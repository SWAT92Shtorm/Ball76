<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="ball.png" />
  <title>🏀 Запись на баскетбол в Ярославле</title>
  <style>
    :root {
      --bg-page: #121212;
      --bg-form: #2d2d2d;
      --bg-card: #222222;
      --bg-button: #007acc;
      --bg-button-hover: #005ca3;
      --border: #404040;
      --text-main: #e0e0e0;
      --text-strong: #ffffff;
      --link-accent: #a0e0ff;
      --price-bg: #1a4b1a;
      --price-bg-high: #501010;
      --price-border: #006633;
      --price-border-high: #a03030;
    }

    body {
      font-family: sans-serif;
      background-color: var(--bg-page);
      color: var(--text-main);
      margin: 0;
      padding: 20px 16px 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }

    h1, h2, h3 {
      color: var(--text-strong);
    }

    /* Общие стили формы */
    label,
    input,
    select,
    button {
      display: block;
      margin: 5px 0;
      padding: 10px;
      width: 100%;
      border-radius: 4px;
      border: 1px solid var(--border);
      box-sizing: border-box;
      font-size: 16px;
      background-color: var(--bg-form);
      color: var(--text-main);
    }

    input:focus,
    select:focus {
      border-color: #00aaff;
      outline: none;
      box-shadow: 0 0 0 2px rgba(0, 170, 255, 0.2);
    }

    button {
      background-color: var(--bg-button);
      color: #ffffff;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 10px 16px;
      margin: 5px 0;
    }

    button:hover {
      background-color: var(--bg-button-hover);
    }

    /* Строка label + input/select */
    .form-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
      flex-wrap: wrap;
    }

    .form-row label {
      margin: 0;
      white-space: nowrap;
      flex: 0 0 auto;
      width: clamp(120px, 25%, 160px);
      font-size: 15px;
      text-align: right;
    }

    .form-row label::after {
      content: ":";
    }

    .form-row input,
    .form-row select {
      margin: 0;
      padding: 10px 12px;
      font-size: 16px;
      flex: 1 1 auto;
      min-width: 160px;
    }

    /* текст ошибки под полем */
    .form-row .error-message {
      color: #ff6666;
      font-size: 13px;
      margin: 4px 0 0 120px;
      display: none;
    }

    .form-row .error-message.active {
      display: block;
    }

    /* таблица и список игроков */
    .players,
    .schedule,
    #historyTableContainer {
      margin-top: 20px;
      padding: 10px;
      background: var(--bg-card);
      border-radius: 5px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background-color: #222222;
    }

    th, td {
      padding: 8px;
      text-align: left;
      border: 1px solid var(--border);
      color: var(--text-main);
    }

    th {
      background: #333333;
    }

    /* текущее время / информация */
    #currentDateTime,
    #nearestGameInfo {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      margin-bottom: 15px;
      font-size: 14px;
    }

    #currentDateTime {
      background: #202020;
      color: #d0ffd0;
    }

    #nearestGameInfo {
      background: #202020;
      color: var(--link-accent);
    }

    /* строка цены */
    #pricingRow {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 14px;
      background: var(--price-bg);
      color: #e0ffe0;
    }

    .playerLine {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 5px 0;
      border-bottom: 1px solid #303030;
      padding-bottom: 4px;
    }

    .playerName {
      flex-grow: 1;
      margin-right: 10px;
      color: var(--text-strong);
    }

    .playerName span {
      margin-right: 10px;
    }

    .icons {
      white-space: nowrap;
    }

    .icons span {
      cursor: pointer;
      margin-left: 6px;
    }

    .responsible {
      margin-top: 4px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #a0ffa0;
    }

    /* анимация успеха */
    #successAnimation {
      display: none;
      text-align: center;
      margin-top: 15px;
    }

    .smile {
      font-size: 50px;
      display: inline-block;
      margin: 0 6px;
      animation: bounceSmile 1.2s ease-in-out 1 forwards;
    }

    @keyframes bounceSmile {
      0%   { transform: translateY(-10px) rotate(0deg); }
      25%  { transform: translateY(0px) rotate(3deg); }
      50%  { transform: translateY(-20px) rotate(-3deg); }
      75%  { transform: translateY(-5px) rotate(1.5deg); }
      100% { transform: translateY(-10px) rotate(0deg); }
    }

    /* модальное окно команд */
    #teamsModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    #teamsModal .modal-content {
      width: 400px;
      max-width: 90%;
      padding: 16px;
      background: var(--bg-card);
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-main);
      font-size: 14px;
    }

    #teamsModal .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
      font-weight: 600;
    }

    #teamsModal .modal-header strong {
      color: var(--text-strong);
    }

    #teamsModal .modal-close-btn {
      cursor: pointer;
      color: #ff6b6b;
      font-size: 18px;
    }

    #teamsModal .teams-list {
      margin-top: 8px;
    }

    #teamsModal .team-card {
      margin-bottom: 16px;
      padding: 10px;
      border: 1px dashed var(--border);
      border-radius: 4px;
    }

    #teamsModal .team-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--link-accent);
    }

    #teamsModal .team-main {
      margin-bottom: 8px;
    }

    #teamsModal .team-main-label {
      font-weight: 500;
    }

    #teamsModal .team-main-item {
      margin-left: 12px;
      margin-top: 2px;
    }

    #teamsModal .team-sub-label {
      font-weight: 500;
    }

    #teamsModal .team-sub-item {
      margin-left: 12px;
      margin-top: 2px;
      color: #a0ffa0;
    }

    #teamsModal .modal-footer {
      margin-top: 16px;
      text-align: right;
    }

    #teamsModal .modal-btn-close {
      padding: 6px 12px;
      background: #333;
      color: var(--text-main);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
    }

    #teamsModal .reroll-btn {
      background-color: var(--bg-button);
      color: #ffffff;
      border: none;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 4px;
      margin-right: 8px;
    }

    /* адаптация под маленькие экраны */
    @media (max-width: 400px) {
      .form-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .form-row label {
        width: 100%;
        margin-bottom: 4px;
        text-align: left;
      }

      .form-row label::after {
        content: "";
      }
    }

    @media (max-width: 360px) {
      body {
        padding: 10px 8px 30px;
      }

      .form-row input,
      .form-row select {
        min-width: auto;
        padding: 9px 10px;
      }
    }
  </style>
</head>

<body>

  <!-- Время вверху -->
  <div id="currentDateTime" role="status" aria-live="polite">
    Загрузка... дата и время
  </div>

  <h1>Запись на баскетбол в Ярославле</h1>

  <!-- Форма -->
  <form id="playerForm" novalidate>
    <!-- Зал -->
    <div class="form-row">
      <label for="hallSelect">Выбери зал</label>
      <select id="hallSelect" aria-label="Выбери зал">
        <option value="">Выберите зал</option>
        <option value="hall1">ЛОКОМОТИВ</option>
        <option value="hall2">АТЛАНТ</option>
      </select>
    </div>

    <div id="nearestGameInfo" role="status" aria-live="polite">
      Ближайшая игра: не выбран зал
    </div>

    <div class="form-row">
      <label for="playerName">Введи ФИО</label>
      <input
        type="text"
        id="playerName"
        placeholder="Иванов Иван Иванович"
        required
        maxlength="50"
        list="playersList"
        aria-describedby="playerNameErrorHint"
      />
      <datalist id="playersList"></datalist>
    </div>

    <div id="playerNameErrorHint" class="form-row">
      <span id="playerNameError" class="error-message">
        ФИО должно состоять из трёх слов: Фамилия Имя Отчество
      </span>
    </div>

    <button type="submit" id="addToGameBtn">
      Записаться
    </button>
  </form>

  <!-- анимация успеха -->
  <div id="successAnimation" aria-live="polite">
    <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
      <div class="smile">🏀</div>
      <div class="smile">⛹🏻‍♂️</div>
      <div class="smile">👍</div>
    </div>
  </div>

  <div id="result" role="region" aria-live="polite"></div>

  <!-- строка стоимости -->
  <div id="pricingRow" role="status" aria-live="polite">
    Стоимость к оплате: не выбран зал.
  </div>

  <!-- Длительность игры -->
  <div class="form-row">
    <label for="durationSelect">Длительность игры</label>
    <select id="durationSelect" aria-label="Длительность игры">
      <option value="full">2 часа</option>
      <option value="short">1 час 30 мин</option>
    </select>
  </div>

  <!-- График игр -->
  <div id="scheduleContainer" class="schedule" style="display: none;">
    <h2>График игр в выбранном зале</h2>
    <div id="scheduleContent"></div>
  </div>

  <!-- история записей по датам -->
  <div id="historyTableContainer" style="display: none;"></div>

  <!-- Модальное окно команд -->
  <div id="teamsModal" role="dialog" aria-modal="true" aria-labelledby="teamsModalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <strong id="teamsModalTitle">Сформированные команды</strong>
        <span class="modal-close-btn" onclick="closeTeamsModal()" title="Закрыть модальное окно">×</span>
      </div>

      <div id="teamsContent" class="teams-list"></div>

      <div class="modal-footer">
        <button class="reroll-btn" onclick="rerollTeams()" aria-label="Перемешать команды">
          🎲 Перемешать
        </button>
        <button class="modal-btn-close" onclick="closeTeamsModal()" aria-label="Закрыть">
          Закрыть
        </button>
      </div>
    </div>
  </div>

  <script>
    const MAX_PLAYERS = 18;

    const hallPrice = {
      "hall1": 6000,
      "hall2": 350
    };

    const hallPriceByDuration = {
      hall1: {
        full:  6000,
        short: 4500
      },
      hall2: {
        full:  0,
        short: 0
      }
    };

    const hallPhone = {
      hall1: "+7 (961) 154-44-11",
      hall2: "+7 (910) 979-22-99"
    };

    let playersByHall = { hall1: [], hall2: [] };
    let playerNames = [];
    let historyByDate = {};
    let lastNearestDate = null;

    document.getElementById('durationSelect').value = 'full';

    // Копирование телефона
    async function copyPhoneToClipboard(phone) {
      try {
        await navigator.clipboard.writeText(phone);
      } catch (err) {
        console.error('Не удалось скопировать телефон:', err);
      }
    }

    function clearHallPlayers() {
      const hall = document.getElementById('hallSelect').value;
      if (!hall) {
        alert('Сначала выбери зал.');
        return;
      }

      const hallName = hall === 'hall1' ? 'ЛОКОМОТИВ' : 'АТЛАНТ';
      if (!confirm(`Очистить весь список зала ${hallName}?`)) return;

      playersByHall[hall] = [];

      showList();
    }

async function loadFromAPI() {
  try {
    const hall = document.getElementById('hallSelect').value;
    const dateStr = getNearestGameDate(hall);
    const response = await fetch(
      `https://ball76.up.railway.app/api/players/${hall}/${dateStr}`
    );

    if (!response.ok) throw new Error('Не удалось загрузить участников');

    const data = await response.json();

    playersByHall = data.playersByHall || { hall1: [], hall2: [] };

    const historyResponse = await fetch(
      'https://ball76.up.railway.app/api/history'
    );

    if (!historyResponse.ok) throw new Error('Не удалось загрузить историю');

    const historyData = await historyResponse.json();
    historyByDate = historyData.historyByDate || {};

    const allNames = new Set();
    Object.values(playersByHall).forEach(hallPlayers => {
      hallPlayers.forEach(name => {
        if (name) allNames.add(name);
      });
    });

    Object.keys(historyByDate).forEach(dateStr => {
      const dateData = historyByDate[dateStr];
      for (const hallId in dateData) {
        const players = dateData[hallId] || [];
        players.forEach(name => {
          if (name) allNames.add(name.trim());
        });
      }
    });

    playerNames = Array.from(allNames);
  } catch (err) {
    console.error('Ошибка при запросе API:', err);
    playersByHall = { hall1: [], hall2: [] };
    historyByDate = {};
    playerNames = [];
  }

  updatePlayersList();
  showList();
}


function showCurrentDateTime() {
  const now = new Date();
  const options = {
    weekday: 'short',
    year: 'numeric',
    month: 'short',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  };
  const dtText = now.toLocaleString('ru-RU', options)
    .replace(',', '')
    .replace('г.', 'г.');
  document.getElementById('currentDateTime').textContent =
    'Сегодня: ' + dtText;
}

function saveHistory() {
  localStorage.setItem('basketballHistoryByDate', JSON.stringify(historyByDate));
}

function collectAllNamesFromHistory() {
  const allNames = new Set();
  playerNames.forEach(name => {
    if (name) allNames.add(name.trim());
  });

  for (const dateStr in historyByDate) {
    const dateData = historyByDate[dateStr];
    for (const hallId in dateData) {
      const players = dateData[hallId] || [];
      players.forEach(name => {
        if (name) allNames.add(name.trim());
      });
    }
  }
  return Array.from(allNames);
}

function showHistoryTable() {
  const hall = document.getElementById('hallSelect').value;
  const histName = hall === 'hall1' ? 'ЛОКОМОТИВ' : 'АТЛАНТ';

  const historyTableContainer = document.getElementById('historyTableContainer');
  historyTableContainer.innerHTML = '';
  historyTableContainer.style.display = 'none';

  if (!hall) {
    return;
  }

  let entries = [];
  Object.keys(historyByDate).forEach(dateStr => {
    const hallData = historyByDate[dateStr][hall] || [];
    if (hallData.length > 0) {
      entries.push({
        date: dateStr,
        players: hallData
      });
    }
  });

  if (entries.length === 0) {
    return;
  }

  historyTableContainer.style.display = 'block';

  entries.sort((a, b) => {
    if (a.date < b.date) return 1;
    if (a.date > b.date) return -1;
    return 0;
  });
  entries = entries.slice(0, 2);

  let html = `
    <h3 style="
      color: #a0e0ff;
      margin-top: 14px;
      margin-bottom: 8px;
      font-size: 16px;">
      История записей в зале ${histName} по датам
    </h3>

    <div style="
      display: flex;
      flex-direction: column;
      gap: 10px;">
  `;

  entries.forEach(entry => {
    const dateStr = entry.date;
    const players = entry.players;

    html += `
      <div style="
        padding: 10px;
        border-radius: 4px;
        background: #222;
        border: 1px solid #404040;
        font-size: 13px;
        color: #e0e0e0;">

        <div style="
          font-weight: 600;
          color: #a0e0ff;
          margin-bottom: 4px;">
          ${dateStr}
        </div>

        <div style="
          line-height: 1.5;">
          ${players.join(', ')}
        </div>
      </div>
    `;
  });

  html += '</div>';

  historyTableContainer.innerHTML = html;
}

function getPastSessions(playerSessions) {
  const now = new Date();
  return playerSessions.filter(session => {
    const sessionDate = new Date(session.date + 'T' + session.time);
    return sessionDate < now;
  });
}

function countPlayerVisits(historyByDate, playerName, hall) {
  let count = 0;
  for (let dateStr in historyByDate) {
    const dateData = historyByDate[dateStr];
    if (dateData[hall]) {
      const hallSessions = dateData[hall].map(p => ({
        date: dateStr,
        time: '21:00',
        name: p
      }));
      const pastSessions = getPastSessions(hallSessions);
      if (pastSessions.some(session => session.name === playerName)) {
        count++;
      }
    }
  }
  return count;
}

function showList() {
  const hall = document.getElementById('hallSelect').value;
  const result = document.getElementById('result');
  const priceElem = document.getElementById('pricingRow');
  const players = playersByHall[hall] || [];

  const currentPlayers = players.length;

  if (!hall) {
    result.innerHTML = '<p>Выберите зал, чтобы увидеть список участников.</p>';
    priceElem.textContent = 'Стоимость к оплате: не выбран зал.';
    return;
  }

  const sel = document.getElementById('hallSelect');
  const hallText = sel.options[sel.selectedIndex].text;
  const parts = hallText.split(' [Отв. ');
  const hallName = parts[0];
  const resp = parts[1] ? parts[1].replace(']', '') : '';

  result.innerHTML = `
    <div style="
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid #404040;">
      <span>
        Все записавшиеся в <span style="color: #a0e0ff;">${hallName}</span>
      </span>
      <span
        style="cursor: pointer; color: red;"
        title="Сформировать команды"
        onclick="openTeamsModal()">
        🎲
      </span>
    </div>

    ${resp ? `
      <div style="
        font-size: 13px;
        margin-bottom: 14px;
        color: #b0ffa0;">
        Ответственный: ${resp}
      </div>
    ` : ''}
  `;

  if (players.length === 0) {
    result.innerHTML += '<p>Список пока пуст.</p>';
  } else {
    const list = players.map((name, i) => {
      const idx = i + 1;
      const isLimited = idx <= MAX_PLAYERS;
      const colorStyle = isLimited ? '' : 'color: red;';
      const nameStyle = isLimited ? '' : 'color: red;';
      return `
        <div class="playerLine" id="playerLine${i}" style="${nameStyle}">
          <div class="playerName">
            <span style="${nameStyle}">${idx}. ${name} 
            <span style="color: #a0e0ff; font-size: 12px; float: right; margin-left: auto;">${countPlayerVisits(historyByDate, name, hall)} <span style="color: #90ff90;"> +1</span></span>
            </span>
            <input type="text" id="nameEdit${i}" value="${name}" style="display: none; width: 250px; padding: 2px;" />
          </div>
          <div class="icons">
            <span onclick="startEdit(${i})" style="cursor: pointer; margin-right: 6px;" title="Редактировать">✎</span>
            <span onclick="submitEdit(${i})" style="display: none; cursor: pointer; margin-right: 6px; color: green;" title="Сохранить">✔</span>
            <span onclick="cancelEdit(${i})" style="display: none; cursor: pointer; margin-right: 6px; color: gray;" title="Отменить">✖</span>
            <span onclick="removePlayer(${i})" style="cursor: pointer; color: red;" title="Удалить">🗑️</span>
          </div>
        </div>
      `;
    }).join('');
    result.innerHTML += list;
  }

  const activeCount = Math.min(MAX_PLAYERS, players.length);
  const perc = Math.min(100, (players.length / MAX_PLAYERS) * 100);
  const barColor = players.length < 10 ? '#c62828' : '#2e7d32';

  result.innerHTML += `
    <div style="margin-top: 12px; font-size: 13px; color: #b0b0b0;">
      Заполненность:
      <span style="color: #ffffff;">
        ${players.length} / ${MAX_PLAYERS} человек
      </span>
      <div style="margin-top: 4px; height: 8px; background: #444; border-radius: 4px; overflow: hidden;">
        <div style="
          height: 100%;
          width: ${perc}%;
          background: ${barColor};
          border-radius: 4px;
          transition: width 0.3s ease;">
        </div>
      </div>
    </div>
  `;

  const hallKey = hall;
  const durationSelect = document.getElementById('durationSelect');
  const durationKey = durationSelect ? durationSelect.value : 'full';
  const price = hallPriceByDuration[hall]?.[durationKey] || hallPrice[hall] || 0;
  const durationText = durationKey === 'full' ? '2 часа' : durationKey === 'short' ? '1 час 30 мин' : '';

  if (price > 500 && players.length > 0) {
    const activeCount = Math.min(MAX_PLAYERS, players.length);
    const perPerson = (price / activeCount).toFixed(2);
    const isUnder10 = players.length < 10;
    const mainBg = isUnder10 ? '#501010' : '#1a4b1a';
    const borderCol = isUnder10 ? '#a03030' : '#006633';
    const phoneBg = isUnder10 ? '#501010' : '#224422';

    priceElem.style.background = mainBg;
    priceElem.style.borderColor = borderCol;

function startEdit(index) {
  const line = document.getElementById(`playerLine${index}`);
  const span = document.querySelector(`#playerLine${index} .playerName span`);
  const input = document.getElementById(`nameEdit${index}`);

  const startIcon = document.querySelector(`span[onclick="startEdit(${index})"]`);
  const submitIcon = document.querySelector(`span[onclick="submitEdit(${index})"]`);
  const cancelIcon = document.querySelector(`span[onclick="cancelEdit(${index})"]`);

  span.style.display = 'none';
  input.style.display = 'inline-block';
  input.focus();

  startIcon.style.display = 'none';
  submitIcon.style.display = 'inline-block';
  cancelIcon.style.display = 'inline-block';
}

async function submitEdit(index) {
  const input = document.getElementById(`nameEdit${index}`);
  const newName = input.value.trim();
  const hall = document.getElementById('hallSelect').value;

  if (!newName) {
    alert('Пожалуйста, введите корректное ФИО');
    return;
  }

  const parts = newName.split(/\s+/).filter(word => word.length > 0);
  if (parts.length < 3) {
    alert('ФИО должно состоять из трёх слов: Фамилия Имя Отчество');
    return;
  }

  const oldName = playersByHall[hall][index];

  if (newName === oldName) {
    cancelEdit(index);
    return;
  }

  try {
    const response = await fetch(
      'https://ball76.up.railway.app/api/player/name',
      {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ currentName: oldName, newName })
      }
    );

    if (!response.ok) {
      const data = await response.json();
      throw new Error(data.error || 'Не удалось изменить игрока');
    }

    const result = await response.json();
    playersByHall = result.playersByHall;

    const idxInNames = playerNames.indexOf(oldName);
    if (idxInNames !== -1) {
      playerNames[idxInNames] = newName;
    }

    await loadFromAPI();
    showList();
  } catch (err) {
    console.error('Ошибка при редактировании через API:', err);
    alert('Не удалось отредактировать игрока через API');
  }
}

function cancelEdit(index) {
  showList();
}

async function removePlayer(index) {
  const hall = document.getElementById('hallSelect').value;
  const name = playersByHall[hall][index];

  if (!confirm(`Удалить "${name}" через API?`)) return;

  const dateStr = getNearestGameDate(hall);
  if (!dateStr) {
    alert('Не удалось определить ближайшую дату игры.');
    return;
  }

  try {
    const response = await fetch(
      `https://ball76.up.railway.app/api/players/${hall}/${dateStr}/${encodeURIComponent(name)}`,
      {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' }
      }
    );

    if (!response.ok) {
      const data = await response.json();
      throw new Error(data.error || 'Ошибка при удалении игрока');
    }

    const result = await response.json();
    const updatedNames = result.playerNames || [];

    playersByHall[hall] = updatedNames;

    const idxInNames = playerNames.indexOf(name);
    if (idxInNames !== -1) {
      playerNames.splice(idxInNames, 1);
    }

    await loadFromAPI();
    showList();
  } catch (err) {
    console.error('Ошибка при удалении через API:', err);
    alert('Не удалось удалить игрока через API');
  }
}

async function addPlayer() {
  const input = document.getElementById('playerName');
  const error = document.getElementById('playerNameError');
  const name = input.value.trim();
  const words = name.split(/\s+/).filter(word => word.length > 0);

  if (!name || words.length < 3) {
    validatePlayerName();
    input.focus();
    return;
  }

  const hall = document.getElementById('hallSelect').value;

  if (!hall) {
    alert('Сначала выберите зал');
    return;
  }

  const dateStr = getNearestGameDate(hall);
  if (!dateStr) {
    alert('Не удалось определить ближайшую дату игры');
    return;
  }

  try {
    const response = await fetch(
      `https://ball76.up.railway.app/api/players/${hall}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, date: dateStr })
      }
    );

    if (!response.ok) {
      throw new Error('Ошибка при добавлении игрока');
    }

    const anim = document.getElementById('successAnimation');
    anim.style.display = 'block';

    setTimeout(() => {
      anim.style.display = 'none';
    }, 3000);

    const result = await response.json();
    playersByHall = result.playersByHall || playersByHall;

    if (!playerNames.includes(name)) {
      playerNames.push(name);
    }

    input.value = '';
    input.style.borderColor = '#ccc';
    input.style.backgroundColor = 'white';
    input.style.color = '#000000';
    error.classList.remove('active');

    showList();
    updatePlayersList();
    await loadFromAPI();
  } catch (err) {
    console.error('Ошибка при добавлении через API:', err);
    alert('Не удалось добавить игрока через API');
  }
}

// ============= Ближайшая игра =============

const dayNamesRU = {
  "Monday": "понедельник",
  "Tuesday": "вторник",
  "Wednesday": "среда",
  "Thursday": "четверг",
  "Friday": "пятница",
  "Saturday": "суббота",
  "Sunday": "воскресенье"
};

const scheduleDefs = [
  { hall: "hall1", day: "Tuesday",  from: 21, to: 23 },
  { hall: "hall1", day: "Thursday", from: 21, to: 23 },
  { hall: "hall2", day: "Friday",   from: 21, to: 23 }
];

function getDayCode(dayName) {
  const map = {
    "Monday": 1,
    "Tuesday": 2,
    "Wednesday": 3,
    "Thursday": 4,
    "Friday": 5,
    "Saturday": 6,
    "Sunday": 7
  };
  return map[dayName] || 0;
}

function getNearestGameDate(hall) {
  const now = new Date();
  const nowWeekDay = now.getDay() || 7;

  let nearest = null;

  scheduleDefs
    .filter(item => item.hall === hall)
    .forEach(item => {
      const dayCode = getDayCode(item.day);
      const dayDiff = (dayCode - nowWeekDay + 7) % 7;

      if (!nearest || dayDiff < (nearest?.dayDiff ?? 999)) {
        nearest = { dayDiff, from: item.from, to: item.to };
      }
    });

  if (!nearest) return null;

  const nearestDate = new Date(now);
  nearestDate.setDate(now.getDate() + nearest.dayDiff);
  nearestDate.setHours(21, 0, 0, 0);

  return nearestDate.toISOString().split('T')[0];
}

function getNearestGameText(hall) {
  const now = new Date();
  const nowWeekDay = now.getDay() || 7;

  let nearest = null;

  scheduleDefs
    .filter(item => item.hall === hall)
    .forEach(item => {
      const dayCode = getDayCode(item.day);
      const dayDiff = (dayCode - nowWeekDay + 7) % 7;

      let timeDiff = dayDiff * 24;

      if (!nearest || timeDiff < nearest.diff) {
        nearest = {
          diff: timeDiff,
          day: item.day,
          from: item.from,
          to: item.to
        };
      }
    });

  if (!nearest) {
    return "Ближайшая игра: не найдено";
  }

  const russianDay = dayNamesRU[nearest.day];

  const nearestDate = new Date(now);
  nearestDate.setDate(now.getDate() + Math.floor(nearest.diff / 24));
  nearestDate.setHours(nearest.from, 0, 0, 0);

  const dateOptions = {
    day: "numeric",
    month: "short",
    weekday: "short"
  };
  const parts = nearestDate.toLocaleString("ru-RU", dateOptions).split(" ");
  const dayNum = parts[1];
  const month = parts[2].replace(".", "");
  const weekday = parts[0].replace(",", "").charAt(0).toUpperCase() + parts[0].slice(1, -1);

  const fromStr = `${nearest.from}:00`;
  const toStr = `${nearest.to}:00`;

  return `Ближайшая игра: ${weekday}, ${dayNum} ${month}, в ${fromStr}`;
}

async function showNearestGame() {
  const hall = document.getElementById('hallSelect').value;
  const info = document.getElementById('nearestGameInfo');

  if (!hall) {
    info.textContent = "Ближайшая игра: не выбран зал";
    return;
  }

  const newNearestText = getNearestGameText(hall);
  const newNearestDate = getNearestGameDate(hall);
  info.textContent = newNearestText;

  // если поменялась дата → перезагружаем данные для этого зала/даты
  if (lastNearestDate && lastNearestDate !== newNearestDate) {
    await loadFromAPI();
    showList();
  }

  lastNearestDate = newNearestDate;
}

// простая случайная разбивка на 2 команды
function createTeams(players) {
  const shuffled = [...players].sort(() => Math.random() - 0.5);
  const mid = Math.floor(shuffled.length / 2);

  return {
    teamA: shuffled.slice(0, mid),
    teamB: shuffled.slice(mid)
  };
}

function renderTeams(teams) {
  const content = document.getElementById('teamsContent');
  content.innerHTML = '';

  const teamA = document.createElement('div');
  teamA.classList.add('team-card');
  teamA.innerHTML = `
    <div class="team-title">Команда A</div>
    <div class="team-main">
      ${teams.teamA.map((name, i) => `
        <div class="team-main-item">${i + 1}. ${name}</div>
      `).join('')}
    </div>
  `;
  content.appendChild(teamA);

  const teamB = document.createElement('div');
  teamB.classList.add('team-card');
  teamB.innerHTML = `
    <div class="team-title">Команда B</div>
    <div class="team-main">
      ${teams.teamB.map((name, i) => `
        <div class="team-main-item">${i + 1}. ${name}</div>
      `).join('')}
    </div>
  `;
  content.appendChild(teamB);
}

function rerollTeams() {
  const hall = document.getElementById('hallSelect').value;
  if (!hall) return;

  const players = playersByHall[hall] || [];
  if (players.length === 0) return;

  const teams = createTeams(players);
  renderTeams(teams);
}
